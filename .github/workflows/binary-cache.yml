---
name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v3
      - run: sudo apt update && sudo apt install -y qemu-user-static
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            extra-platforms = aarch64-linux
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - uses: cachix/cachix-action@v14
        with:
          name: quinneden
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - run: |
          nix build -L --impure --system aarch64-linux .#nixosConfigurations.nixos.config.system.build.toplevel
          nix build -L --impure --system aarch64-darwin .#darwinConfigurations.macos.config.system.build.toplevel